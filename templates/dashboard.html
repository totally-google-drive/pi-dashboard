<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🍓 Pi Dashboard</h1>
            <button class="btn logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <!-- CPU Card -->
            <div class="stat-card" id="cpu-card">
                <div class="card-icon cpu-icon"><i class="fas fa-microchip"></i></div>
                <h3><i class="fas fa-microchip"></i> CPU Usage</h3>
                <div class="value" id="cpu-percent">0%</div>
                <div class="progress-bar">
                    <div class="fill low" style="width: 0%"></div>
                </div>
                <div class="sub-text">
                    <span id="cpu-cores">0 cores</span> | Temp: <span id="cpu-temp">--</span>
                </div>
                <h4 style="margin: 12px 0 8px; font-size: 0.85em; color: var(--text-secondary);">Top by CPU</h4>
                <div class="process-header">
                    <span style="flex: 1;">Name</span>
                    <span style="width: 50px; text-align: right;">CPU</span>
                </div>
                <div class="process-list" id="process-cpu-list" style="max-height: 120px;"></div>
            </div>

            <!-- Memory Card -->
            <div class="stat-card" id="mem-card">
                <div class="card-icon mem-icon"><i class="fas fa-memory"></i></div>
                <h3><i class="fas fa-memory"></i> Memory</h3>
                <div class="value" id="mem-percent">0%</div>
                <div class="progress-bar">
                    <div class="fill low" style="width: 0%"></div>
                </div>
                <div class="sub-text" id="mem-used">0 / 0</div>
                <h4 style="margin: 12px 0 8px; font-size: 0.85em; color: var(--text-secondary);">Top by Memory</h4>
                <div class="process-header">
                    <span style="flex: 1;">Name</span>
                    <span style="width: 50px; text-align: right;">Mem</span>
                </div>
                <div class="process-list" id="process-mem-list" style="max-height: 120px;"></div>
            </div>

            <!-- Disk Card -->
            <div class="stat-card" id="disk-card">
                <div class="card-icon disk-icon"><i class="fas fa-hard-drive"></i></div>
                <h3><i class="fas fa-hard-drive"></i> Storage</h3>
                <div class="value" id="disk-percent">0%</div>
                <div class="progress-bar">
                    <div class="fill low" style="width: 0%"></div>
                </div>
                <div class="sub-text" id="disk-used">0 / 0</div>
            </div>

            <!-- Network Card -->
            <div class="stat-card">
                <div class="card-icon net-icon"><i class="fas fa-network-wired"></i></div>
                <h3><i class="fas fa-network-wired"></i> Network Speed</h3>
                <div class="network-stats">
                    <div class="network-stat">
                        <div class="label">↑ Upload</div>
                        <div class="value" id="net-sent">0 B/s</div>
                    </div>
                    <div class="network-stat">
                        <div class="label">↓ Download</div>
                        <div class="value" id="net-recv">0 B/s</div>
                    </div>
                </div>
            </div>

            <!-- Disk I/O Card -->
            <div class="stat-card">
                <div class="card-icon disk-io-icon"><i class="fas fa-exchange-alt"></i></div>
                <h3><i class="fas fa-exchange-alt"></i> Disk I/O</h3>
                <div class="network-stats">
                    <div class="network-stat">
                        <div class="label">Read</div>
                        <div class="value" id="disk-read">0 B</div>
                    </div>
                    <div class="network-stat">
                        <div class="label">Write</div>
                        <div class="value" id="disk-write">0 B</div>
                    </div>
                </div>
            </div>

            <!-- CPU Temperature Card -->
            <div class="stat-card temp-card">
                <div class="card-icon temp-icon"><i class="fas fa-thermometer-half"></i></div>
                <h3><i class="fas fa-thermometer-half"></i> CPU Temperature</h3>
                <div class="value" id="cpu-temp-card">--°C</div>
                <div class="sub-text">Raspberry Pi 5</div>
            </div>
        </div>

        <!-- Docker Section -->
        <div class="docker-section">
            <h2><i class="fas fa-docker"></i> Docker Containers</h2>
            <div class="docker-grid" id="docker-list">
                <p style="color: var(--text-secondary);">Loading containers...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        initDashboard();
    </script>
</body>
</html>
